<!DOCTYPE html>
<html lang="zh-HK" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>盲轉TV — Google TV 版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- CRT Overlay -->
  <div class="crt-overlay" id="crtOverlay" aria-hidden="true"></div>
  <div class="crt-scanlines" id="crtScanlines" aria-hidden="true"></div>
  <div class="vignette" id="vignette" aria-hidden="true"></div>

  <!-- Main Player Area -->
  <div class="player-wrap" id="playerWrap">
    <div class="player-frame" id="playerFrame">
      <!-- Welcome Screen -->
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-inner">
          <div class="tv-logo">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none" aria-label="盲轉TV Logo">
              <rect x="4" y="12" width="56" height="36" rx="4" stroke="currentColor" stroke-width="3" fill="none"/>
              <rect x="16" y="48" width="32" height="4" rx="2" fill="currentColor" opacity="0.5"/>
              <rect x="26" y="52" width="12" height="4" rx="2" fill="currentColor" opacity="0.3"/>
              <circle cx="32" cy="30" r="8" stroke="currentColor" stroke-width="2.5" fill="none"/>
              <path d="M29 30l5-3v6l-5-3z" fill="currentColor"/>
            </svg>
          </div>
          <h1 class="welcome-title">盲轉TV</h1>
          <p class="welcome-sub">YouTube 頻道轉台器 · Google TV 版</p>
          <div class="welcome-hint">
            <div class="hint-row"><span class="key-badge">菜單</span><span>開啟頻道表</span></div>
            <div class="hint-row"><span class="key-badge">◀ ▶</span><span>切換頻道</span></div>
            <div class="hint-row"><span class="key-badge">▲ ▼</span><span>切換影片</span></div>
            <div class="hint-row"><span class="key-badge">⏯</span><span>播放/暫停</span></div>
          </div>
          <button class="btn-primary" id="btnOpenGuide" autofocus>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
            開啟頻道表
          </button>
        </div>
      </div>

      <!-- YouTube IFrame -->
      <div class="yt-container" id="ytContainer" style="display:none">
        <div id="ytPlayer"></div>
      </div>
    </div>

    <!-- Channel HUD (top bar) -->
    <div class="hud-top" id="hudTop" aria-live="polite">
      <div class="hud-ch-num" id="hudChNum"></div>
      <div class="hud-ch-info">
        <div class="hud-ch-name" id="hudChName"></div>
        <div class="hud-vid-title" id="hudVidTitle"></div>
      </div>
      <div class="hud-meta">
        <div class="hud-time" id="hudTime"></div>
        <div class="hud-stereo">STEREO</div>
      </div>
    </div>

    <!-- Bottom Toolbar (visible on focus / remote activity) -->
    <div class="toolbar" id="toolbar">
      <button class="tb-btn" id="btnPrevCh" title="上一頻道 (◀)" aria-label="上一頻道">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15,18 9,12 15,6"/></svg>
        <span>頻道</span>
      </button>
      <button class="tb-btn" id="btnPrevVid" title="上一影片 (▲)" aria-label="上一影片">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="18,15 12,9 6,15"/></svg>
        <span>影片</span>
      </button>
      <button class="tb-btn tb-play" id="btnPlayPause" title="播放/暫停" aria-label="播放/暫停">
        <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        <span id="tbPlayLabel">播放</span>
      </button>
      <button class="tb-btn" id="btnNextVid" title="下一影片 (▼)" aria-label="下一影片">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="6,9 12,15 18,9"/></svg>
        <span>影片</span>
      </button>
      <button class="tb-btn" id="btnNextCh" title="下一頻道 (▶)" aria-label="下一頻道">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9,18 15,12 9,6"/></svg>
        <span>頻道</span>
      </button>
      <div class="tb-divider"></div>
      <button class="tb-btn" id="btnGuide" title="頻道表 (菜單/綠)" aria-label="頻道表">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        <span>頻道表</span>
      </button>
      <button class="tb-btn" id="btnRandom" title="隨機 (紅)" aria-label="隨機轉台">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16,3 21,3 21,8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21,16 21,21 16,21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        <span>隨機</span>
      </button>
      <button class="tb-btn" id="btnSubtitle" title="字幕 (藍)" aria-label="字幕">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M7 15h4M13 15h4M7 11h10"/></svg>
        <span>字幕</span>
      </button>
      <button class="tb-btn" id="btnCrt" title="CRT 特效 (黃)" aria-label="CRT 特效">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M6 7h4M14 7h4M6 11h12" stroke-dasharray="2 2"/></svg>
        <span>CRT</span>
      </button>
      <button class="tb-btn" id="btnFullscreen" title="全螢幕" aria-label="全螢幕">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        <span>全螢幕</span>
      </button>
    </div>
  </div>

  <!-- Channel Guide Overlay -->
  <div class="guide-overlay" id="guideOverlay" aria-modal="true" role="dialog" aria-label="頻道表">
    <div class="guide-panel">
      <div class="guide-header">
        <div class="guide-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          頻道表
        </div>
        <div class="guide-actions">
          <button class="guide-add-btn" id="btnAddChannel">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新增頻道
          </button>
          <button class="guide-close-btn" id="btnCloseGuide" aria-label="關閉頻道表">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div class="guide-tabs">
        <button class="guide-tab active" data-tab="all" id="tabAll">全部頻道</button>
        <button class="guide-tab" data-tab="fav" id="tabFav">我的最愛</button>
      </div>

      <div class="guide-search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="guideSearch" placeholder="搜尋頻道..." aria-label="搜尋頻道">
      </div>

      <div class="guide-list" id="guideList" role="listbox" aria-label="頻道列表"></div>

      <div class="guide-footer">
        <span class="guide-hint"><span class="key-badge-sm">▲▼</span> 選擇</span>
        <span class="guide-hint"><span class="key-badge-sm">確認</span> 觀看</span>
        <span class="guide-hint"><span class="key-badge-sm">返回</span> 關閉</span>
      </div>
    </div>
  </div>

  <!-- Add Channel Modal -->
  <div class="modal-overlay" id="addModal" aria-modal="true" role="dialog" aria-label="新增頻道">
    <div class="modal-panel">
      <div class="modal-header">
        <h2>新增頻道</h2>
        <button class="guide-close-btn" id="btnCloseModal" aria-label="關閉">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="inputChName">頻道名稱</label>
          <input type="text" id="inputChName" placeholder="例：ViuTV, 香港電台..." autocomplete="off">
        </div>
        <div class="form-group">
          <label for="inputChId">YouTube 頻道 ID</label>
          <input type="text" id="inputChId" placeholder="UCxxxxxxxxxxxxxxxxxx..." autocomplete="off">
          <p class="form-hint">從 youtube.com/channel/<strong>UCxxxxxx</strong> 複製 UC 開頭的字串</p>
        </div>
        <div class="form-group">
          <label for="inputChNum">頻道號碼 <span class="optional">(可選)</span></label>
          <input type="number" id="inputChNum" placeholder="自動分配" min="1" max="999">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btnCancelModal">取消</button>
        <button class="btn-primary" id="btnConfirmAdd">新增</button>
      </div>
    </div>
  </div>

  <!-- Number Input OSD -->
  <div class="osd-num" id="osdNum" aria-live="assertive"></div>

  <!-- Channel Change OSD -->
  <div class="osd-ch" id="osdCh" aria-live="polite">
    <div class="osd-ch-num" id="osdChNum"></div>
    <div class="osd-ch-name" id="osdChName"></div>
    <div class="osd-ch-bar"><div class="osd-ch-bar-fill" id="osdChBarFill"></div></div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast" aria-live="assertive" role="alert"></div>

  <!-- CRT Intensity Slider OSD -->
  <div class="osd-crt" id="osdCrt">
    <span>CRT 強度</span>
    <div class="crt-slider-wrap">
      <input type="range" id="crtSlider" min="0" max="100" value="40" aria-label="CRT 特效強度">
      <span id="crtVal">40%</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
